<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ html_title }}</title>
    <script>
      window.__API_BASE__ = {{ api_base_js|safe }};
      (function () {
        try {
          var _b64 = "{{ register_bootstrap_b64 }}".replace(/\s+/g, "");
          window.__REGISTER_BOOTSTRAP__ = JSON.parse(atob(_b64));
        } catch (e) {
          window.__REGISTER_BOOTSTRAP__ = null;
        }
      })();
    </script>
    <style>
      :root {
        --bg: #f6f7f9;
        --card: #fff;
        --text: #1a1d26;
        --muted: #5c6473;
        --border: #e8eaef;
        --btn-primary: #185fa5;
        --btn-primary-hover: #144a84;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 24px 48px;
      }
      .header-row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }
      .titles h1 {
        margin: 0 0 6px;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .titles p {
        margin: 0;
        font-size: 0.95rem;
        color: var(--muted);
      }
      .ui-verify {
        margin: 10px 0 0;
        font-size: 0.7rem;
        line-height: 1.35;
        color: #64748b;
        max-width: 42rem;
        word-break: break-word;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 40px;
        padding: 0 16px;
        font-size: 0.875rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .btn:hover {
        filter: brightness(0.98);
      }
      .btn-primary {
        background: var(--btn-primary);
        color: #fff;
        border-color: var(--btn-primary);
      }
      .btn-primary:hover {
        background: var(--btn-primary-hover);
        border-color: var(--btn-primary-hover);
      }
      .btn-icon {
        width: 40px;
        padding: 0;
        justify-content: center;
        font-size: 1.25rem;
        line-height: 1;
        color: var(--muted);
      }
      .chip-strip-wrap {
        margin-bottom: 24px;
      }
      .chip-section-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 10px;
      }
      .chip-strip {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
        gap: 10px;
        padding: 12px 4px 14px;
        border-bottom: 1px solid var(--border);
      }
      .chip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        min-height: 44px;
        background: var(--card);
        border-radius: 999px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        font-size: 0.8125rem;
        font-weight: 500;
        white-space: nowrap;
      }
      .chip-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .chip-count {
        font-weight: 700;
        color: var(--text);
        margin-left: 4px;
      }
      .panel {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panel-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        font-size: 0.9rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
      }
      th,
      td {
        text-align: left;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      th {
        color: var(--muted);
        font-weight: 600;
        background: #fafbfc;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .empty {
        padding: 40px 20px;
        text-align: center;
        color: var(--muted);
        font-size: 0.875rem;
      }
      .err {
        padding: 16px;
        background: #fff4f4;
        color: #a40000;
        border-radius: 8px;
        font-size: 0.875rem;
        margin-bottom: 16px;
      }
      .chip--clickable {
        cursor: pointer;
      }
      .chip--clickable:hover {
        border-color: var(--btn-primary);
      }
      .chip-selected {
        outline: 2px solid var(--btn-primary);
        outline-offset: 2px;
      }
      .btn-sm {
        height: 34px;
        padding: 0 12px;
        font-size: 0.8125rem;
      }
      .btn-danger {
        background: #fef2f2;
        color: #b91c1c;
        border-color: #fecaca;
      }
      .btn-danger:hover {
        background: #fee2e2;
      }
      .ea-panel {
        margin-bottom: 20px;
      }
      .ea-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .ea-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: #fafbfc;
      }
      .ea-tabs.ea-tabs--hidden {
        display: none;
      }
      .ea-tab {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        font-weight: 600;
        font-size: 0.8125rem;
        cursor: pointer;
        font-family: inherit;
      }
      .ea-tab:hover {
        border-color: #c5cad6;
      }
      .ea-tab.active {
        background: var(--btn-primary);
        color: #fff;
        border-color: var(--btn-primary);
      }
      .ea-toolbar {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .ea-table-scroll {
        overflow-x: auto;
        max-width: 100%;
        min-height: 120px;
      }
      .ea-table-scroll table {
        min-width: max-content;
        font-size: 0.75rem;
      }
      .ea-table-scroll th,
      .ea-table-scroll td {
        padding: 8px 10px;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ea-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        white-space: normal;
        max-width: none;
      }
      .ea-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px 16px;
        overflow-y: auto;
      }
      .ea-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
      }
      .ea-modal-box {
        position: relative;
        z-index: 1;
        width: min(720px, 100%);
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
        padding: 20px;
        max-height: 90vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .ea-modal-box h3 {
        margin: 0 0 16px;
        font-size: 1.1rem;
      }
      #registerForm {
        overflow-y: auto;
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        padding-right: 4px;
      }
      @media (max-width: 560px) {
        #registerForm {
          grid-template-columns: 1fr;
        }
      }
      .ea-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
      }
      .ea-field input {
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 400;
        color: var(--text);
        font-family: inherit;
      }
      .ea-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body data-categories-b64="{{ bootstrap_b64 }}">
    <!-- ui-categories: {% for c in categories %}{{ c.id }}{% if not loop.last %},{% endif %}{% endfor %} -->
    <div class="page">
      <div id="err" class="err" style="display: none"></div>

      <header class="header-row">
        <div class="titles">
          <h1 id="dashTitle">Asset register</h1>
          <p id="dashSubtitle">All company assets in one place</p>
          <p id="uiVerify" class="ui-verify">
            {{ ui_verify }}
            <a href="{{ api_base }}/api/debug-ui" target="_blank" rel="noopener" style="color: #185fa5"
              >Open /api/debug-ui</a
            >
            (must list GatePass; if the page chips look wrong, wrong app on this port).
          </p>
        </div>
        <div class="header-actions">
          <button type="button" class="btn" id="btnExport" title="Download CSV">
            <span aria-hidden="true">↓</span> Export all
          </button>
          <button type="button" class="btn btn-primary" id="btnAdd">+ Add asset</button>
          <button type="button" class="btn btn-icon" id="btnMenu" aria-label="More options">
            ⋮
          </button>
        </div>
      </header>

      <div class="chip-strip-wrap">
        <div class="chip-section-label" id="chipSectionLabel">Categories (13)</div>
        <div class="chip-strip" id="chipStrip" aria-label="Categories">
          {% for c in categories %}
          <div class="chip chip--clickable" data-category-id="{{ c.id }}">
            <span class="chip-dot" style="background:{{ c.color }}"></span>
            <span>{{ c.label }}</span>
            <span class="chip-count">{{ c.count }}</span>
          </div>
          {% endfor %}
        </div>
      </div>

      <section
        id="registerDetailPanel"
        class="panel ea-panel"
        style="display: none"
        aria-label="Register detail tables"
      >
        <div class="panel-head ea-panel-head">
          <span id="registerPanelTitle">—</span>
          <button type="button" class="btn btn-sm" id="registerCloseBtn">Close</button>
        </div>
        <div class="ea-tabs" id="registerTabs" role="tablist"></div>
        <div class="ea-toolbar">
          <button type="button" class="btn btn-primary btn-sm" id="registerAddBtn">+ Add row</button>
        </div>
        <div class="ea-table-scroll" id="registerTableScroll">
          <p class="empty" style="padding: 20px">Loading…</p>
        </div>
      </section>

      <div id="registerModal" class="ea-modal" style="display: none" aria-hidden="true">
        <div class="ea-modal-backdrop" id="registerModalBackdrop"></div>
        <div class="ea-modal-box">
          <h3 id="registerModalTitle">Add row</h3>
          <form id="registerForm"></form>
          <div class="ea-modal-actions">
            <button type="button" class="btn" id="registerModalCancel">Cancel</button>
            <button type="submit" class="btn btn-primary" form="registerForm">Save</button>
          </div>
        </div>
      </div>

    </div>

    <script type="application/json" id="categories-bootstrap">{{ categories_bootstrap_json | safe }}</script>
    <script type="application/json" id="chip-defs">{{ chip_defs_json | safe }}</script>
    <script type="text/plain" id="register-bootstrap-b64" style="display: none">
      {{ register_bootstrap_b64 | safe }}
    </script>

    <script>
      (function () {
        var chipStrip = document.getElementById("chipStrip");
        var errEl = document.getElementById("err");

        function absApi(path) {
          var b = typeof window.__API_BASE__ === "string" ? window.__API_BASE__ : "";
          if (path.charAt(0) !== "/") path = "/" + path;
          return b ? b + path : path;
        }

        function showErr(msg) {
          errEl.textContent = msg;
          errEl.style.display = "block";
        }

        function categoryLabel(id) {
          var map = {
            laptop: "Laptop",
            desktop: "Desktop",
            monitor: "Monitors",
            networking: "Networking",
            cloud_asset_register: "Cloud Asset Register",
            infodesk_applications: "Infodesk Applications",
            third_party_softwares: "Third Party Softwares",
            ups: "UPS",
            mobile_phones: "Mobile Phones",
            scanner_and_others: "Scanner and Others",
            admin: "Admin",
            gatepass: "GatePass",
            infodesk_leavers: "InfoDesk_Leavers",
          };
          return map[id] || id;
        }

        var categoriesBootstrap = [];
        try {
          var b64 = document.body.getAttribute("data-categories-b64");
          if (b64 && b64.trim()) {
            categoriesBootstrap = JSON.parse(atob(b64.trim()));
          }
        } catch (e0) {}
        try {
          if (!categoriesBootstrap.length) {
            var bootEl = document.getElementById("categories-bootstrap");
            if (bootEl && bootEl.textContent) {
              categoriesBootstrap = JSON.parse(bootEl.textContent.trim());
            }
          }
        } catch (e1) {}

        var CHIP_DEFS_FALLBACK = [
          { id: "laptop", color: "#185FA5" },
          { id: "desktop", color: "#1D4ED8" },
          { id: "monitor", color: "#2563EB" },
          { id: "networking", color: "#4B2E83" },
          { id: "cloud_asset_register", color: "#0F766E" },
          { id: "infodesk_applications", color: "#0369A1" },
          { id: "third_party_softwares", color: "#1E3A5F" },
          { id: "ups", color: "#9F1239" },
          { id: "mobile_phones", color: "#BE123C" },
          { id: "scanner_and_others", color: "#A21CAF" },
          { id: "admin", color: "#8B3A3A" },
          { id: "gatepass", color: "#B45309" },
          { id: "infodesk_leavers", color: "#7C3AED" },
        ];

        var chipDefsOrdered = [];
        try {
          var defEl = document.getElementById("chip-defs");
          if (defEl && defEl.textContent) {
            chipDefsOrdered = JSON.parse(defEl.textContent.trim());
          }
        } catch (e2) {}
        if (!chipDefsOrdered || chipDefsOrdered.length < 13) {
          chipDefsOrdered = CHIP_DEFS_FALLBACK;
        }

        function chipsForStrip(apiCats) {
          var apiById = {};
          (apiCats || []).forEach(function (c) {
            apiById[c.id] = c;
          });
          var bootById = {};
          categoriesBootstrap.forEach(function (b) {
            bootById[b.id] = b;
          });
          return chipDefsOrdered.map(function (def) {
            var a = apiById[def.id];
            var b = bootById[def.id];
            return {
              id: def.id,
              label:
                (a && a.label) ||
                (b && b.label) ||
                categoryLabel(def.id),
              color: (a && a.color) || (b && b.color) || def.color || "#888",
              count:
                a && a.count != null
                  ? a.count
                  : b && b.count != null
                    ? b.count
                    : 0,
            };
          });
        }

        function render(data) {
          if (data.title) document.getElementById("dashTitle").textContent = data.title;
          if (data.subtitle)
            document.getElementById("dashSubtitle").textContent = data.subtitle;

          var labelEl = document.getElementById("chipSectionLabel");
          if (labelEl) {
            labelEl.textContent = "Categories (" + chipDefsOrdered.length + ")";
          }

          var categories = chipsForStrip(data.categories);
          chipStrip.innerHTML = "";
          categories.forEach(function (c) {
            var el = document.createElement("div");
            el.className = "chip chip--clickable";
            el.setAttribute("data-category-id", c.id);
            el.innerHTML =
              '<span class="chip-dot" style="background:' +
              (c.color || "#888") +
              '"></span><span>' +
              escapeHtml(c.label || categoryLabel(c.id)) +
              '</span><span class="chip-count">' +
              (c.count != null ? c.count : 0) +
              "</span>";
            chipStrip.appendChild(el);
          });

        }

        function escapeHtml(s) {
          if (!s) return "";
          var d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }

        async function load() {
          try {
            var url = absApi("/api/dashboard-data?_=" + Date.now());
            var res = await fetch(url, {
              credentials: "same-origin",
              cache: "no-store",
            });
            if (!res.ok) throw new Error("API " + res.status);
            render(await res.json());
          } catch (e) {
            try {
              var r2 = await fetch(absApi("/static/dashboard-data.json?_=" + Date.now()), {
                cache: "no-store",
              });
              if (!r2.ok) throw new Error("static JSON missing");
              render(await r2.json());
            } catch (e2) {
              showErr("Could not load dashboard data. Run: python scripts/build_dashboard_data.py");
            }
          }
        }

        document.getElementById("btnExport").addEventListener("click", function () {
          window.location.href = absApi("/api/assets/export.csv");
        });
        document.getElementById("btnAdd").addEventListener("click", function () {
          alert(
            "Click a category chip first. For Laptop, Networking, UPS, etc.: use + Add row in the panel. For GatePass or InfoDesk_Leavers: same — open that chip, then + Add row."
          );
        });
        document.getElementById("btnMenu").addEventListener("click", function () {
          alert("Menu: add settings / help links here.");
        });

        var REG_API = "/api/register-tables";
        var SUMMARY_API = "/api/summary-assets";
        var detailMode = null;
        var summaryCategory = null;
        var regPanel = document.getElementById("registerDetailPanel");
        var regTableScroll = document.getElementById("registerTableScroll");
        var regTabs = document.getElementById("registerTabs");
        var regKindsMeta = null;
        var regPanels = [];
        var regCurrentKind = "laptop";
        var regEditingId = null;
        var regModalKind = "laptop";

        function readRegisterBootstrap() {
          var o = window.__REGISTER_BOOTSTRAP__;
          if (o && typeof o === "object" && o.kinds && Array.isArray(o.panels) && o.panels.length)
            return o;
          var el = document.getElementById("register-bootstrap-b64");
          if (!el) return null;
          try {
            var t = el.textContent.replace(/\s+/g, "");
            if (!t) return null;
            return JSON.parse(atob(t));
          } catch (e) {
            return null;
          }
        }

        function hydrateRegPanelsFromBootstrap() {
          var b = readRegisterBootstrap();
          if (!b || !b.kinds) return false;
          regKindsMeta = regKindsMeta || b.kinds;
          if (Array.isArray(b.panels) && b.panels.length) {
            regPanels = b.panels;
            return true;
          }
          return false;
        }

        function panelForCategory(categoryId) {
          for (var i = 0; i < regPanels.length; i++) {
            if (regPanels[i].category_id === categoryId) return regPanels[i];
          }
          return null;
        }

        function isSummaryOnlyCategory(categoryId) {
          return categoryId === "gatepass" || categoryId === "infodesk_leavers";
        }

        function renderRegisterTabs(panel) {
          regTabs.innerHTML = "";
          regTabs.classList.toggle("ea-tabs--hidden", !panel.tabs || panel.tabs.length < 2);
          (panel.tabs || []).forEach(function (tab, idx) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "ea-tab" + (idx === 0 ? " active" : "");
            b.setAttribute("data-reg-kind", tab.kind);
            b.setAttribute("role", "tab");
            b.textContent = tab.label;
            regTabs.appendChild(b);
          });
        }

        async function fetchRegisterMeta(force) {
          if (regKindsMeta && regPanels.length && !force) return regKindsMeta;
          try {
            var r = await fetch(absApi(REG_API + "/meta?_=" + Date.now()), {
              cache: "no-store",
            });
            if (r.ok) {
              var full = await r.json();
              if (full.kinds) regKindsMeta = full.kinds;
              if (Array.isArray(full.panels) && full.panels.length) regPanels = full.panels;
            }
          } catch (e) {}
          hydrateRegPanelsFromBootstrap();
          if (regKindsMeta && regPanels.length) return regKindsMeta;
          throw new Error(
            "Register layout missing (page bootstrap could not be read). Hard-refresh (Ctrl+F5)."
          );
        }

        async function loadRegTable(kind) {
          regCurrentKind = kind;
          regTableScroll.innerHTML = '<p class="empty" style="padding:20px">Loading…</p>';
          try {
            await fetchRegisterMeta(true);
            var r = await fetch(absApi(REG_API + "/" + kind + "?_=" + Date.now()), {
              cache: "no-store",
            });
            if (!r.ok) {
              var errBody = await r.text();
              throw new Error(kind + " HTTP " + r.status + ": " + errBody.slice(0, 400));
            }
            var data = await r.json();
            var cols = regKindsMeta[kind].columns;
            var html =
              "<table><thead><tr><th>ID</th><th>Actions</th>";
            cols.forEach(function (c) {
              html += "<th>" + escapeHtml(c.label) + "</th>";
            });
            html += "<th>created_at</th><th>updated_at</th></tr></thead><tbody>";
            (data.rows || []).forEach(function (row) {
              html += "<tr><td>" + escapeHtml(String(row.id)) + '</td><td class="ea-actions">';
              html +=
                '<button type="button" class="btn btn-sm ea-edit" data-id="' +
                row.id +
                '">Edit</button>';
              html +=
                '<button type="button" class="btn btn-sm btn-danger ea-del" data-id="' +
                row.id +
                '">Delete</button></td>';
              cols.forEach(function (c) {
                var v = row[c.key];
                html += "<td>" + escapeHtml(v != null ? String(v) : "—") + "</td>";
              });
              html +=
                "<td>" +
                escapeHtml(row.created_at || "—") +
                "</td><td>" +
                escapeHtml(row.updated_at || "—") +
                "</td></tr>";
            });
            html += "</tbody></table>";
            if (!data.rows || !data.rows.length) {
              html = '<p class="empty" style="padding:20px">No rows yet. Click <strong>+ Add row</strong>.</p>';
            }
            regTableScroll.innerHTML = html;
            regTableScroll.querySelectorAll(".ea-edit").forEach(function (btn) {
              btn.addEventListener("click", function () {
                openRegModal(kind, parseInt(btn.getAttribute("data-id"), 10));
              });
            });
            regTableScroll.querySelectorAll(".ea-del").forEach(function (btn) {
              btn.addEventListener("click", async function () {
                var id = parseInt(btn.getAttribute("data-id"), 10);
                if (!confirm("Delete row " + id + "?")) return;
                var dr = await fetch(absApi(REG_API + "/" + kind + "/" + id), {
                  method: "DELETE",
                });
                if (!dr.ok) alert("Delete failed: " + dr.status);
                else loadRegTable(kind);
              });
            });
          } catch (e) {
            var msg = e && e.message ? e.message : String(e);
            var cols = regKindsMeta && regKindsMeta[kind] && regKindsMeta[kind].columns;
            if (cols && cols.length) {
              var colspan = 2 + cols.length + 2;
              var htmlErr =
                "<table><thead><tr><th>ID</th><th>Actions</th>";
              cols.forEach(function (c) {
                htmlErr += "<th>" + escapeHtml(c.label) + "</th>";
              });
              htmlErr +=
                "<th>created_at</th><th>updated_at</th></tr></thead><tbody><tr><td colspan=\"" +
                colspan +
                '" style="padding:20px;color:#b91c1c;word-break:break-word">' +
                escapeHtml(msg) +
                "</td></tr></tbody></table>";
              regTableScroll.innerHTML = htmlErr;
            } else {
              regTableScroll.innerHTML =
                '<p class="empty" style="padding:20px;color:#b91c1c;word-break:break-word">' +
                escapeHtml(msg) +
                "</p>";
            }
          }
        }

        function setRegTabActive(kind) {
          regTabs.querySelectorAll(".ea-tab").forEach(function (t) {
            t.classList.toggle("active", t.getAttribute("data-reg-kind") === kind);
          });
        }

        async function openRegisterPanel(categoryId, fromChip) {
          var panel = panelForCategory(categoryId);
          if (!panel || !panel.tabs || !panel.tabs.length) return;
          detailMode = "register";
          summaryCategory = null;
          document.querySelectorAll(".chip-selected").forEach(function (c) {
            c.classList.remove("chip-selected");
          });
          if (fromChip) fromChip.classList.add("chip-selected");
          document.getElementById("registerPanelTitle").textContent = panel.title;
          renderRegisterTabs(panel);
          regCurrentKind = panel.tabs[0].kind;
          regPanel.style.display = "block";
          setRegTabActive(regCurrentKind);
          await loadRegTable(regCurrentKind);
          regPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        async function openSummaryPanel(categoryId, fromChip) {
          detailMode = "summary";
          summaryCategory = categoryId;
          document.querySelectorAll(".chip-selected").forEach(function (c) {
            c.classList.remove("chip-selected");
          });
          if (fromChip) fromChip.classList.add("chip-selected");
          document.getElementById("registerPanelTitle").textContent =
            categoryLabel(categoryId) + " — summary list";
          regTabs.innerHTML = "";
          regTabs.classList.add("ea-tabs--hidden");
          regPanel.style.display = "block";
          await loadSummaryTable(categoryId);
          regPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        async function loadSummaryTable(categoryId) {
          regTableScroll.innerHTML = '<p class="empty" style="padding:20px">Loading…</p>';
          try {
            var r = await fetch(absApi(SUMMARY_API + "/" + categoryId + "?_=" + Date.now()), {
              cache: "no-store",
            });
            if (!r.ok) {
              var t = await r.text();
              throw new Error("summary HTTP " + r.status + ": " + t.slice(0, 400));
            }
            var data = await r.json();
            var rows = data.rows || [];
            var html =
              "<table><thead><tr><th>ID</th><th>Actions</th><th>Name</th><th>Serial number</th><th>Notes</th><th>created_at</th></tr></thead><tbody>";
            rows.forEach(function (row) {
              html += "<tr><td>" + escapeHtml(String(row.id)) + '</td><td class="ea-actions">';
              html +=
                '<button type="button" class="btn btn-sm sum-edit" data-id="' +
                row.id +
                '">Edit</button>';
              html +=
                '<button type="button" class="btn btn-sm btn-danger sum-del" data-id="' +
                row.id +
                '">Delete</button></td>';
              html +=
                "<td>" +
                escapeHtml(row.name || "—") +
                "</td><td>" +
                escapeHtml(row.serial_number || "—") +
                "</td><td>" +
                escapeHtml(row.notes || "—") +
                "</td><td>" +
                escapeHtml(row.created_at || "—") +
                "</td></tr>";
            });
            html += "</tbody></table>";
            if (!rows.length) {
              html =
                '<p class="empty" style="padding:20px">No rows yet. Click <strong>+ Add row</strong>.</p>';
            }
            regTableScroll.innerHTML = html;
            regTableScroll.querySelectorAll(".sum-edit").forEach(function (btn) {
              btn.addEventListener("click", function () {
                openSummaryModal(parseInt(btn.getAttribute("data-id"), 10));
              });
            });
            regTableScroll.querySelectorAll(".sum-del").forEach(function (btn) {
              btn.addEventListener("click", async function () {
                var id = parseInt(btn.getAttribute("data-id"), 10);
                if (!confirm("Delete asset " + id + "?")) return;
                var dr = await fetch(absApi(SUMMARY_API + "/row/" + id), { method: "DELETE" });
                if (!dr.ok) alert("Delete failed: " + dr.status);
                else {
                  await loadSummaryTable(categoryId);
                  load();
                }
              });
            });
          } catch (e) {
            var msg = e && e.message ? e.message : String(e);
            regTableScroll.innerHTML =
              '<p class="empty" style="padding:20px;color:#b91c1c">' + escapeHtml(msg) + "</p>";
          }
        }

        function summaryFormShell() {
          return (
            '<label class="ea-field"><span>Name</span><input type="text" name="name" autocomplete="off" required /></label>' +
            '<label class="ea-field"><span>Serial number</span><input type="text" name="serial_number" autocomplete="off" /></label>' +
            '<label class="ea-field"><span>Notes</span><input type="text" name="notes" autocomplete="off" /></label>'
          );
        }

        async function openSummaryModal(rowId) {
          if (!summaryCategory) return;
          regEditingId = rowId == null ? null : rowId;
          document.getElementById("registerModalTitle").textContent =
            rowId == null ? "Add " + categoryLabel(summaryCategory) : "Edit asset #" + rowId;
          var form = document.getElementById("registerForm");
          form.innerHTML = summaryFormShell();
          if (rowId != null) {
            var r = await fetch(
              absApi(SUMMARY_API + "/" + summaryCategory + "?_=" + Date.now()),
              { cache: "no-store" }
            );
            var data = await r.json();
            var row = (data.rows || []).find(function (x) {
              return x.id === rowId;
            });
            if (row) {
              form.querySelector('input[name="name"]').value = row.name != null ? row.name : "";
              form.querySelector('input[name="serial_number"]').value =
                row.serial_number != null ? row.serial_number : "";
              form.querySelector('input[name="notes"]').value = row.notes != null ? row.notes : "";
            }
          }
          document.getElementById("registerModal").style.display = "flex";
          document.getElementById("registerModal").setAttribute("aria-hidden", "false");
        }

        function closeRegisterPanel() {
          regPanel.style.display = "none";
          detailMode = null;
          summaryCategory = null;
          document.querySelectorAll(".chip-selected").forEach(function (c) {
            c.classList.remove("chip-selected");
          });
        }

        chipStrip.addEventListener("click", function (ev) {
          var chip = ev.target.closest(".chip");
          if (!chip) return;
          var id = chip.getAttribute("data-category-id");
          hydrateRegPanelsFromBootstrap();
          if (panelForCategory(id)) {
            openRegisterPanel(id, chip).catch(function (e) {
              var m = e && e.message ? e.message : String(e);
              showErr("Register: " + m);
            });
            return;
          }
          if (isSummaryOnlyCategory(id)) {
            openSummaryPanel(id, chip).catch(function (e) {
              var m = e && e.message ? e.message : String(e);
              showErr("Summary: " + m);
            });
            return;
          }
          fetchRegisterMeta(true)
            .then(function () {
              hydrateRegPanelsFromBootstrap();
              if (panelForCategory(id)) {
                return openRegisterPanel(id, chip);
              }
              if (isSummaryOnlyCategory(id)) {
                return openSummaryPanel(id, chip);
              }
              alert(
                "This category is not configured (chip id: " +
                  id +
                  "). Hard-refresh the page or open /api/debug-ui."
              );
            })
            .catch(function (e) {
              var m = e && e.message ? e.message : String(e);
              showErr("Could not load register layout: " + m);
            });
        });

        regTabs.addEventListener("click", function (ev) {
          if (detailMode !== "register") return;
          var tab = ev.target.closest(".ea-tab");
          if (!tab) return;
          var kind = tab.getAttribute("data-reg-kind");
          if (!kind) return;
          setRegTabActive(kind);
          loadRegTable(kind);
        });

        document.getElementById("registerCloseBtn").addEventListener("click", closeRegisterPanel);

        function buildRegFormHtml(kind) {
          var cols = regKindsMeta[kind].columns;
          var html = "";
          cols.forEach(function (col) {
            html +=
              '<label class="ea-field"><span>' +
              escapeHtml(col.label) +
              '</span><input type="text" name="' +
              escapeHtml(col.key) +
              '" autocomplete="off" /></label>';
          });
          return html;
        }

        async function openRegModal(kind, rowId) {
          await fetchRegisterMeta(true);
          regModalKind = kind;
          regEditingId = rowId == null ? null : rowId;
          document.getElementById("registerModalTitle").textContent =
            rowId == null ? "Add row" : "Edit row #" + rowId;
          var form = document.getElementById("registerForm");
          form.innerHTML = buildRegFormHtml(kind);
          if (rowId != null) {
            var r = await fetch(absApi(REG_API + "/" + kind + "?_=" + Date.now()), {
              cache: "no-store",
            });
            var data = await r.json();
            var row = (data.rows || []).find(function (x) {
              return x.id === rowId;
            });
            if (row) {
              form.querySelectorAll("input[name]").forEach(function (inp) {
                var k = inp.getAttribute("name");
                if (row[k] != null) inp.value = row[k];
              });
            }
          }
          document.getElementById("registerModal").style.display = "flex";
          document.getElementById("registerModal").setAttribute("aria-hidden", "false");
        }

        function closeRegModal() {
          document.getElementById("registerModal").style.display = "none";
          document.getElementById("registerModal").setAttribute("aria-hidden", "true");
          regEditingId = null;
        }

        document.getElementById("registerAddBtn").addEventListener("click", function () {
          if (detailMode === "summary") openSummaryModal(null);
          else openRegModal(regCurrentKind, null);
        });

        document.getElementById("registerModalCancel").addEventListener("click", closeRegModal);
        document.getElementById("registerModalBackdrop").addEventListener("click", closeRegModal);

        document.getElementById("registerForm").addEventListener("submit", async function (ev) {
          ev.preventDefault();
          var form = ev.target;
          var fd = new FormData(form);
          var body = {};
          fd.forEach(function (v, k) {
            body[k] = v;
          });
          if (detailMode === "summary" && summaryCategory) {
            var url, method;
            if (regEditingId == null) {
              url = absApi(SUMMARY_API + "/" + summaryCategory);
              method = "POST";
            } else {
              url = absApi(SUMMARY_API + "/row/" + regEditingId);
              method = "PUT";
            }
            var sr = await fetch(url, {
              method: method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            if (!sr.ok) {
              alert("Save failed: " + sr.status);
              return;
            }
            closeRegModal();
            await loadSummaryTable(summaryCategory);
            load();
            return;
          }
          var kind = regModalKind;
          var url, method;
          if (regEditingId == null) {
            url = absApi(REG_API + "/" + kind);
            method = "POST";
          } else {
            url = absApi(REG_API + "/" + kind + "/" + regEditingId);
            method = "PUT";
          }
          var r = await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            alert("Save failed: " + r.status);
            return;
          }
          closeRegModal();
          loadRegTable(kind);
        });

        hydrateRegPanelsFromBootstrap();

        load();
      })();
    </script>
  </body>
</html>
