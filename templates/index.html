<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ html_title }}</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --card: #fff;
        --text: #1a1d26;
        --muted: #5c6473;
        --border: #e8eaef;
        --btn-primary: #185fa5;
        --btn-primary-hover: #144a84;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 24px 48px;
      }
      .header-row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }
      .titles h1 {
        margin: 0 0 6px;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .titles p {
        margin: 0;
        font-size: 0.95rem;
        color: var(--muted);
      }
      .ui-verify {
        margin: 10px 0 0;
        font-size: 0.7rem;
        line-height: 1.35;
        color: #64748b;
        max-width: 42rem;
        word-break: break-word;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 40px;
        padding: 0 16px;
        font-size: 0.875rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .btn:hover {
        filter: brightness(0.98);
      }
      .btn-primary {
        background: var(--btn-primary);
        color: #fff;
        border-color: var(--btn-primary);
      }
      .btn-primary:hover {
        background: var(--btn-primary-hover);
        border-color: var(--btn-primary-hover);
      }
      .btn-icon {
        width: 40px;
        padding: 0;
        justify-content: center;
        font-size: 1.25rem;
        line-height: 1;
        color: var(--muted);
      }
      .chip-strip-wrap {
        margin-bottom: 24px;
      }
      .chip-section-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 10px;
      }
      .chip-strip {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
        gap: 10px;
        padding: 12px 4px 14px;
        border-bottom: 1px solid var(--border);
      }
      .chip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        min-height: 44px;
        background: var(--card);
        border-radius: 999px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        font-size: 0.8125rem;
        font-weight: 500;
        white-space: nowrap;
      }
      .chip-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .chip-count {
        font-weight: 700;
        color: var(--text);
        margin-left: 4px;
      }
      .panel {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panel-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        font-size: 0.9rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
      }
      th,
      td {
        text-align: left;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      th {
        color: var(--muted);
        font-weight: 600;
        background: #fafbfc;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .empty {
        padding: 40px 20px;
        text-align: center;
        color: var(--muted);
        font-size: 0.875rem;
      }
      .err {
        padding: 16px;
        background: #fff4f4;
        color: #a40000;
        border-radius: 8px;
        font-size: 0.875rem;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body data-categories-b64="{{ bootstrap_b64 }}">
    <!-- ui-categories: {% for c in categories %}{{ c.id }}{% if not loop.last %},{% endif %}{% endfor %} -->
    <div class="page">
      <div id="err" class="err" style="display: none"></div>

      <header class="header-row">
        <div class="titles">
          <h1 id="dashTitle">Asset register</h1>
          <p id="dashSubtitle">All company assets in one place</p>
          <p id="uiVerify" class="ui-verify">
            {{ ui_verify }}
            <a href="/api/debug-ui" target="_blank" rel="noopener" style="color: #185fa5"
              >Open /api/debug-ui</a
            >
            (must list GatePass; if the page chips look wrong, wrong app on this port).
          </p>
        </div>
        <div class="header-actions">
          <button type="button" class="btn" id="btnExport" title="Download CSV">
            <span aria-hidden="true">↓</span> Export all
          </button>
          <button type="button" class="btn btn-primary" id="btnAdd">+ Add asset</button>
          <button type="button" class="btn btn-icon" id="btnMenu" aria-label="More options">
            ⋮
          </button>
        </div>
      </header>

      <div class="chip-strip-wrap">
        <div class="chip-section-label" id="chipSectionLabel">Categories (7)</div>
        <div class="chip-strip" id="chipStrip" aria-label="Categories">
          {% for c in categories %}
          <div class="chip" data-category-id="{{ c.id }}">
            <span class="chip-dot" style="background:{{ c.color }}"></span>
            <span>{{ c.label }}</span>
            <span class="chip-count">{{ c.count }}</span>
          </div>
          {% endfor %}
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">Recent assets</div>
        <div id="tableWrap">
          <div class="empty" id="emptyState">Loading…</div>
        </div>
      </section>
    </div>

    <script type="application/json" id="categories-bootstrap">{{ categories_bootstrap_json | safe }}</script>
    <script type="application/json" id="chip-defs">{{ chip_defs_json | safe }}</script>

    <script>
      (function () {
        var chipStrip = document.getElementById("chipStrip");
        var tableWrap = document.getElementById("tableWrap");
        var emptyState = document.getElementById("emptyState");
        var errEl = document.getElementById("err");

        function showErr(msg) {
          errEl.textContent = msg;
          errEl.style.display = "block";
        }

        function categoryLabel(id) {
          var map = {
            employee_assets: "Employee_Assets",
            internal_assets: "Internal Assets",
            external_assets: "External Assets",
            cloud_assets: "Cloud_Assets",
            admin_assets: "Admin_Assets",
            gatepass: "GatePass",
            infodesk_leavers: "InfoDesk_Leavers",
            employee_devices: "Employee_Assets",
            network: "Internal Assets",
            infodesk_apps: "InfoDesk_Leavers",
            third_party: "Admin_Assets",
          };
          return map[id] || id;
        }

        var categoriesBootstrap = [];
        try {
          var b64 = document.body.getAttribute("data-categories-b64");
          if (b64 && b64.trim()) {
            categoriesBootstrap = JSON.parse(atob(b64.trim()));
          }
        } catch (e0) {}
        try {
          if (!categoriesBootstrap.length) {
            var bootEl = document.getElementById("categories-bootstrap");
            if (bootEl && bootEl.textContent) {
              categoriesBootstrap = JSON.parse(bootEl.textContent.trim());
            }
          }
        } catch (e1) {}

        var CHIP_DEFS_FALLBACK = [
          { id: "employee_assets", color: "#185FA5" },
          { id: "internal_assets", color: "#4B2E83" },
          { id: "external_assets", color: "#1E3A5F" },
          { id: "cloud_assets", color: "#0F766E" },
          { id: "admin_assets", color: "#8B3A3A" },
          { id: "gatepass", color: "#B45309" },
          { id: "infodesk_leavers", color: "#7C3AED" },
        ];

        var chipDefsOrdered = [];
        try {
          var defEl = document.getElementById("chip-defs");
          if (defEl && defEl.textContent) {
            chipDefsOrdered = JSON.parse(defEl.textContent.trim());
          }
        } catch (e2) {}
        if (!chipDefsOrdered || chipDefsOrdered.length < 7) {
          chipDefsOrdered = CHIP_DEFS_FALLBACK;
        }

        function chipsForStrip(apiCats) {
          var apiById = {};
          (apiCats || []).forEach(function (c) {
            apiById[c.id] = c;
          });
          var bootById = {};
          categoriesBootstrap.forEach(function (b) {
            bootById[b.id] = b;
          });
          return chipDefsOrdered.map(function (def) {
            var a = apiById[def.id];
            var b = bootById[def.id];
            return {
              id: def.id,
              color: (a && a.color) || (b && b.color) || def.color || "#888",
              count:
                a && a.count != null
                  ? a.count
                  : b && b.count != null
                    ? b.count
                    : 0,
            };
          });
        }

        function render(data) {
          if (data.title) document.getElementById("dashTitle").textContent = data.title;
          if (data.subtitle)
            document.getElementById("dashSubtitle").textContent = data.subtitle;

          var labelEl = document.getElementById("chipSectionLabel");
          if (labelEl) {
            labelEl.textContent = "Categories (" + chipDefsOrdered.length + ")";
          }

          var categories = chipsForStrip(data.categories);
          chipStrip.innerHTML = "";
          categories.forEach(function (c) {
            var el = document.createElement("div");
            el.className = "chip";
            el.setAttribute("data-category-id", c.id);
            el.innerHTML =
              '<span class="chip-dot" style="background:' +
              (c.color || "#888") +
              '"></span><span>' +
              escapeHtml(categoryLabel(c.id)) +
              '</span><span class="chip-count">' +
              (c.count != null ? c.count : 0) +
              "</span>";
            chipStrip.appendChild(el);
          });

          var items = data.items || [];
          if (items.length === 0) {
            tableWrap.innerHTML =
              '<div class="empty">No assets yet. Use GitHub Actions + SQLite or add rows in <code>data/assets.db</code>.</div>';
            return;
          }

          var html =
            "<table><thead><tr><th>Name</th><th>Category</th><th>Serial</th><th>Created</th></tr></thead><tbody>";
          items.forEach(function (r) {
            html +=
              "<tr><td>" +
              escapeHtml(r.name) +
              "</td><td>" +
              escapeHtml(categoryLabel(r.category)) +
              "</td><td>" +
              escapeHtml(r.serial_number || "—") +
              "</td><td>" +
              escapeHtml(r.created_at || "—") +
              "</td></tr>";
          });
          html += "</tbody></table>";
          tableWrap.innerHTML = html;
        }

        function escapeHtml(s) {
          if (!s) return "";
          var d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }

        async function load() {
          try {
            var url = "/api/dashboard-data?_=" + Date.now();
            var res = await fetch(url, {
              credentials: "same-origin",
              cache: "no-store",
            });
            if (!res.ok) throw new Error("API " + res.status);
            render(await res.json());
          } catch (e) {
            try {
              var r2 = await fetch("/static/dashboard-data.json?_=" + Date.now(), {
                cache: "no-store",
              });
              if (!r2.ok) throw new Error("static JSON missing");
              render(await r2.json());
            } catch (e2) {
              showErr("Could not load dashboard data. Run: python scripts/build_dashboard_data.py");
              tableWrap.innerHTML = "";
            }
          }
        }

        document.getElementById("btnExport").addEventListener("click", function () {
          window.location.href = "/api/assets/export.csv";
        });
        document.getElementById("btnAdd").addEventListener("click", function () {
          alert("Add asset: wire this to a form or POST /api/assets in a later step.");
        });
        document.getElementById("btnMenu").addEventListener("click", function () {
          alert("Menu: add settings / help links here.");
        });

        load();
      })();
    </script>
  </body>
</html>
