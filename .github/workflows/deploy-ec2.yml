# SSH deploy to EC2 on every push to main (and manual run).
#
# Add these repository secrets: Settings → Secrets and variables → Actions
#   DEPLOY_HOST      — Elastic IP or public DNS (e.g. 3.110.xx.xx)
#   SSH_PRIVATE_KEY  — full PEM/OpenSSH private key that matches the instance key pair
# Optional secrets:
#   DEPLOY_PORT      — SSH port if not 22
#   DEPLOY_USER      — SSH user (defaults to ubuntu in workflow)
#
# The instance must already have cloned this repo to:
#   /home/ubuntu/Employee_Asset_Management_Register
# (Terraform user_data does that.)
#
name: Deploy EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: cfg
        env:
          H: ${{ secrets.DEPLOY_HOST }}
          K: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$H" ] && [ -n "$K" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped: set DEPLOY_HOST and SSH_PRIVATE_KEY in repo Actions secrets."
          fi

      - name: Deploy over SSH
        if: steps.cfg.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || 'ubuntu' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ubuntu/Employee_Asset_Management_Register
            git remote set-url origin https://github.com/bigb787/Employee_Asset_Management_Register.git
            git fetch origin main
            git reset --hard origin/main
            export DEPLOY_SKIP_GIT=1
            bash deploy.sh
