# Full /etc/nginx/nginx.conf for a single-app EC2 host (replaces stock file).
# Stock Ubuntu nginx loads conf.d BEFORE sites-enabled; defaults there keep the welcome page.
# Deploy: sudo cp nginx/standalone-nginx.conf /etc/nginx/nginx.conf && sudo nginx -t && sudo systemctl restart nginx

user www-data;
worker_processes auto;
pid /run/nginx.pid;
# Omit modules-enabled include: empty glob breaks `nginx -t` on some images.

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
